<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
    <style> body { margin: 0; background: #000; } </style>
</head>
<body>
<script>
class GameScene extends Phaser.Scene {
    preload() {
           // Fundo
        this.load.image('background', 'assets/IARA.png');
        // --- CARREGAMENTO DE ASSETS ---
        this.load.image('arrow_left', 'assets/green_arrow.png'); 
        this.load.image('arrow_down', 'assets/pink_arrow.png');
        this.load.image('arrow_up', 'assets/pink_arrow.png');
        this.load.image('arrow_right', 'assets/green_arrow.png');
    }

    create() {
         // IMAGEM DE FUNDO
        this.add.image(960, 540, 'background')
            .setDisplaySize(1920, 1080);

        this.score = 0;
        this.score = 0;
        this.health = 0.5;
        this.isGameOver = false;
        this.lanes = [760, 860, 960, 1060];
        this.notes = this.add.group();
        this.hitY = 900;

        // --- SETAS FIXAS (ZONA DE ACERTO) ---
        this.laneKeys = ['arrow_left', 'arrow_down', 'arrow_up', 'arrow_right'];
        this.laneKeys.forEach((key, index) => {
            let ghost = this.add.sprite(this.lanes[index], this.hitY, key);
            ghost.setAlpha(0.3);
            ghost.setScale(0.8);
            
            // Rotação de setas
        if(index === 0) ghost.setAngle(180); // Esquerda
        if(index === 1) ghost.setAngle(90);  // Baixo
        if(index === 2) ghost.setAngle(-90); // Cima
        if(index === 3) ghost.setAngle(0);   // Direita
        });

        this.setupHealthBar();

        this.keys = this.input.keyboard.addKeys({ 
            left: "LEFT", down: "DOWN", up: "UP", right: "RIGHT" 
        });

        this.input.keyboard.on('keydown', (event) => {
            if (this.isGameOver) return;
            const keyNames = ["ARROWLEFT", "ARROWDOWN", "ARROWUP", "ARROWRIGHT", "LEFT", "DOWN", "UP", "RIGHT"];
            if (keyNames.includes(event.key.toUpperCase())) {
                let hitSuccess = false;
                this.notes.getChildren().forEach(note => {
                    if (Math.abs(note.y - this.hitY) < 70) hitSuccess = true;
                });
                if (!hitSuccess) {
                    this.health -= 0.05;
                    this.cameras.main.shake(100, 0.005);
                }
            }
        });

        this.spawnTimer = this.time.addEvent({ 
            delay: 800, callback: this.spawnNote, callbackScope: this, loop: true 
        });

        this.setupEndMenu();
    }

    setupHealthBar() {
        const barX = 960; const barY = 1000;
        this.healthBarBg = this.add.rectangle(barX, barY, 600, 20, 0xff0000);
        this.healthBar = this.add.rectangle(barX + 300, barY, 600, 20, 0x00ff00).setOrigin(1, 0.5);
        this.scoreText = this.add.text(960, 1040, "Score: 0", { fontSize: "24px" }).setOrigin(0.5);
    }

   setupEndMenu() {
    this.uiGroup = this.add.group();
    this.menuBg = this.add.rectangle(960, 540, 1920, 1080, 0x000000, 0.8).setDepth(100);
    this.menuTitle = this.add.text(960, 400, "", { fontSize: "100px", fontWeight: "bold" }).setOrigin(0.5).setDepth(101);
    
    this.btnRetry = this.add.text(960, 580, "TENTAR DE NOVO", { 
        fontSize: "40px", backgroundColor: "#00ff00", color: "#000", padding: { x: 20, y: 10 } 
    }).setOrigin(0.5).setDepth(101).setInteractive({ useHandCursor: true });

    this.btnQuit = this.add.text(960, 680, "SAIR PARA O MENU", { 
        fontSize: "30px", color: "#ff0000" 
    }).setOrigin(0.5).setDepth(101).setInteractive({ useHandCursor: true });

    this.btnRetry.on('pointerdown', () => this.scene.restart());
    
    this.btnQuit.on('pointerdown', () => {
        window.location.href = "menu.html";
    });

    this.uiGroup.addMultiple([this.menuBg, this.menuTitle, this.btnRetry, this.btnQuit]);
    this.uiGroup.setVisible(false);
}

    spawnNote() {
        if (this.isGameOver) return;
        let lane = Phaser.Math.Between(0, 3);
        
        // --- NOTA COMO SPRITE ---
        let note = this.add.sprite(this.lanes[lane], 0, this.laneKeys[lane]);
        note.setScale(0.8);
        note.lane = lane;

        // Ajuste de rotação para as notas que caem
        if(lane === 0) note.setAngle(180); // Esquerda
        if(lane === 1) note.setAngle(90); // Baixo
        if(lane === 2) note.setAngle(-90);   // Cima
        if(lane === 3) note.setAngle(0);  // Direita

        this.notes.add(note);
    }

    update(time, delta) {
        if (this.isGameOver) return;

        this.notes.getChildren().forEach(note => {
            note.y += 450 * (delta / 1000);

            if (note.y > this.hitY + 80) {
                this.health -= 0.08;
                note.destroy();
            }

            if (this.checkHit(note)) {
                this.health += 0.04;
                this.score += 100;
                this.scoreText.setText("Score: " + this.score);
                note.destroy();
            }
        });

        this.health = Phaser.Math.Clamp(this.health, 0, 1);
        this.updateHealthUI();

        if (this.health <= 0) this.gameOver(false);
        if (this.score >= 3000) this.gameOver(true);
    }

    updateHealthUI() {
        const barWidth = 600;
        const barX = 960;
        this.healthBar.width = barWidth * this.health;
        this.healthBar.fillColor = (this.health < 0.2) ? 0xffaa00 : 0x00ff00;
    }

    gameOver(vitoria) {
        this.isGameOver = true;
        this.spawnTimer.remove();
        this.uiGroup.setVisible(true);
        this.menuTitle.setText(vitoria ? "VITÓRIA!" : "GAME OVER");
        this.menuTitle.setColor(vitoria ? "#00ff00" : "#ff0000");
    }

    checkHit(note) {
        let key = ["left", "down", "up", "right"][note.lane];
        let pressed = Phaser.Input.Keyboard.JustDown(this.keys[key]);
        let dist = Math.abs(note.y - this.hitY);
        return pressed && dist < 70;
    }
}

const config = {
    type: Phaser.AUTO,
    width: 1920, height: 1080,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: GameScene
};
new Phaser.Game(config);
</script>
</body>
</html>
