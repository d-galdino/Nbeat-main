<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu com Overlay de Vídeo</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        @import url(https://fonts.googleapis.com/css?family=Kite+One);
        @import url(https://fonts.googleapis.com/css?family=Offside);

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; /* Evita scrolls indesejados por causa do vídeo */
        }

        body {
            background: #0D6050; /* Cor de fundo caso o vídeo falhe */
            font: normal 1.1em Calibri;
        }

        /* --- Estilização do Vídeo de Fundo --- */
        #video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2; /* Fica atrás de tudo */
            object-fit: cover; /* Garante que preencha a tela sem distorcer */
        }

        /* Overlay escuro para dar contraste ao texto */
        .overlay-dim {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        nav {
            height: 25%;
            width: 30%;
            position: absolute;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%);
            transform: translate(-50%, -50%);
            font: normal 1.2em Offside;
        }

        p { margin: 5px 0; }
        li a { display: block; }
        a { text-decoration: none; color: #eee; transition: all linear .3s; }

        a:hover {
            color: #ecbb15;
            position: relative;
            cursor: pointer;
            text-shadow: rgb(172, 136, 15) 0px 1px 0px,
                         rgb(108, 86, 10) 0px 2px 0px,
                         rgba(0, 0, 0, 0.199219) 0px 3px 1px,
                         rgba(0, 0, 0, 0.296875) 0px 4px 2px;
        }

        li a:after {
            content: attr(data-title);
            padding: 4px 8px;
            line-height: 100%;
            color: #fff;
            position: absolute;
            left: 40%;
            top: 70%;
            white-space: nowrap;
            z-index: 20px;
            font-size: .7em;
            background: rgba(23, 172, 144, .8);
            opacity: 0;
            text-shadow: none;
        }

        li a:hover:after {
            opacity: 1;
            transition: all linear .5s .2s ;
        }

        ul { list-style-type: none; padding: 0; margin: 0; }
        li { width: 100%; text-align: center; line-height: 2.5em; float: left; }

        li:first-child {
            line-height: 60px;
            font-size: 1.5em;
            text-shadow: rgb(187, 187, 187) 0px 1px 0px,
                         rgb(181, 181, 181) 0px 2px 0px,
                         rgba(0, 0, 0, 0.199219) 0px 3px 1px,
                         rgba(0, 0, 0, 0.296875) 0px 4px 3px;
        }

        li:first-child a:hover { -transform-webkit-animation: anim infinite 1.5s;}

        @-webkit-keyframes anim {
            0% { -webkit-transform: rotate(4deg); }
            50% { -webkit-transform: rotate(-4deg); }
            100% { -webkit-transform: rotate(4deg); }
        }
        @keyframes anim {
            0% { -webkit-transform: rotate(4deg); }
            50% { -webkit-transform: rotate(-4deg); }
            100% { -webkit-transform: rotate(4deg); }
        }

        section {
            width: 400px;
            background: #222;
            color: #fff;
            position: absolute;
            top: 50%;
            left: 50%;
            -webkit-transform: translate(-50%, -50%) scale(0.6);
            transform: translate(-50%, -50%) scale(0.6);
            opacity: 0;
            z-index: -1;
            transition: all .3s ease-in;
            box-shadow: 0 0 20px #000;
            font: normal 1em 'Kite One';
        }

        header {
            height: 32px;
            padding: 0 8px;
            line-height: 32px;
            color: #000;
            background: #17AC90;
            font-weight: bold;
            font-size: .9em;
        }

        section > div { padding: 10px 4px; text-align: center; }

        .close:after {
            content: "X";
            color: #fff;
            height: 32px;
            width: 32px;
            line-height: 32px;
            text-align: center;
            background: #D63623;
            position: absolute;
            top: 0;
            right: 0;
            transition: all .2s linear;
            font-family: Arial;
        }

        .close:hover:after { background: #FF311A; }

        .active {
            -webkit-transform: translate(-50%, -50%) scale(1);
            transform: translate(-50%, -50%) scale(1);
            transition: all .3s ease-out;
            opacity: 1;
            z-index: 10;
        }

        /* --- Novos estilos adicionados para a aba de Opções --- */
        .config-row { 
            margin: 15px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 20px; 
        }
        .key-btn { 
            background: #17AC90; 
            border: none; 
            color: white; 
            padding: 5px 10px; 
            cursor: pointer; 
            border-radius: 4px; 
            min-width: 100px; 
            font-family: 'Offside', sans-serif;
            font-size: 0.85em;
            transition: background 0.2s;
        }
        .key-btn:hover { background: #1bc4a4; }
        .key-btn.waiting { background: #ecbb15; color: black; }
    </style>
</head>
<body>

    <video autoplay muted loop id="video-background">
        <source src="video.mp4" type="video/mp4">
        Seu navegador não suporta vídeos.
    </video>
    <div class="overlay-dim"></div>

    <nav>
        <ul>
            <li><a href="jogo_teste.html" data-title="Comece a aventura!" id="jogar-btn">JOGAR!</a></li>
            <li><a data-title="Configure o jogo" id="op-btn">OPÇÕES</a></li>
            <li><a data-title="Músicas, imagens e mais" id="midia-btn">MÍDIA</a></li>
        </ul>
    </nav>

    <section id="opcoes">
        <header>
            Opções
            <div class="close"></div>
        </header>
        <div>
            <div class="config-row">
                <label for="volume-slider">Volume Geral:</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
            </div>
            <div class="config-row">
                <label for="mute-checkbox">Desativar Música (Mute):</label>
                <input type="checkbox" id="mute-checkbox">
            </div>
            
            <hr style="border-color: #444; margin: 15px 10px;">
            <p style="font-size: 0.85em; color: #ecbb15;">Clique no botão e pressione a nova tecla:</p>
            
            <div class="config-row">
                <span>Esquerda:</span> <button class="key-btn" id="key-left" data-lane="left">ARROWLEFT</button>
            </div>
            <div class="config-row">
                <span>Baixo:</span> <button class="key-btn" id="key-down" data-lane="down">ARROWDOWN</button>
            </div>
            <div class="config-row">
                <span>Cima:</span> <button class="key-btn" id="key-up" data-lane="up">ARROWUP</button>
            </div>
            <div class="config-row">
                <span>Direita:</span> <button class="key-btn" id="key-right" data-lane="right">ARROWRIGHT</button>
            </div>
        </div>
    </section>

    <section id="midia">
        <header>
            Mídia
            <div class="close"></div>
        </header>
        <div>
            <p>Conteúdo multimídia aqui.</p>
        </div>
    </section>

    <script>
        $(document).ready(function(){
            // Carregar configurações salvas ou definir os padrões iniciais (Caso seja a primeira execução)
            let controls = JSON.parse(localStorage.getItem('fnf_controls')) || {
                left: { key: "ARROWLEFT", code: "LEFT" },
                down: { key: "ARROWDOWN", code: "DOWN" },
                up: { key: "ARROWUP", code: "UP" },
                right: { key: "ARROWRIGHT", code: "RIGHT" }
            };
            let volume = localStorage.getItem('fnf_volume') || "1";
            let mute = localStorage.getItem('fnf_mute') === "true";

            // Aplicar os valores carregados na interface visual do Menu
            $("#volume-slider").val(volume);
            $("#mute-checkbox").prop('checked', mute);
            $("#key-left").text(controls.left.key);
            $("#key-down").text(controls.down.key);
            $("#key-up").text(controls.up.key);
            $("#key-right").text(controls.right.key);

            // Ouvintes para salvar alterações de Volume/Mute instantaneamente
            $("#volume-slider").on('input', function() {
                localStorage.setItem('fnf_volume', $(this).val());
            });
            $("#mute-checkbox").on('change', function() {
                localStorage.setItem('fnf_mute', $(this).is(':checked'));
            });

            // Lógica para detectar e remapear as teclas
            let laneAguardando = null;

            $(".key-btn").click(function() {
                $(".key-btn").removeClass("waiting");
                $(this).addClass("waiting").text("Aperte algo...");
                laneAguardando = $(this).data("lane");
            });

            $(document).keydown(function(e) {
                if (laneAguardando) {
                    let nomeTecla = e.key.toUpperCase();
                    let codigoPhaser = nomeTecla;

                    // Ajusta mapeamento das setas para corresponder ao padrão addKeys do Phaser
                    if(e.keyCode === 37) codigoPhaser = "LEFT";
                    if(e.keyCode === 38) code = "UP";
                    if(e.keyCode === 38) codigoPhaser = "UP";
                    if(e.keyCode === 39) codigoPhaser = "RIGHT";
                    if(e.keyCode === 40) codigoPhaser = "DOWN";
                    if(e.keyCode === 32) { nomeTecla = "ESPAÇO"; codigoPhaser = "SPACE"; }

                    // Atualiza o objeto local e salva no localStorage
                    controls[laneAguardando] = { key: nomeTecla, code: codigoPhaser };
                    localStorage.setItem('fnf_controls', JSON.stringify(controls));

                    // Atualiza o texto do botão modificado
                    $("#key-" + laneAguardando).removeClass("waiting").text(nomeTecla);
                    laneAguardando = null;
                }
            });

            // Gerenciamento das Janelas do Menu
            $("#op-btn").click(function(event){
                event.preventDefault();
                $("#opcoes").addClass("active");
            });

            $("#midia-btn").click(function(event){
                event.preventDefault();
                $("#midia").addClass("active");
            });

            $(".close").click(function() {
                laneAguardando = null; // Cancela se fechar no meio do mapeamento
                $(this).closest("section").removeClass("active");
            });
        });
    </script>
</body>
</html>
